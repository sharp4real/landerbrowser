<div class="panel-head">
  <span class="panel-title">AI Summary</span>
  <span id="ai-sum-provider-tag" style="font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(var(--acc-raw),.1);color:var(--acc);margin-left:auto;white-space:nowrap"></span>
</div>
<div id="ai-sum-body" style="padding:14px 16px;flex:1;overflow-y:auto;font-size:13px;color:var(--t1);line-height:1.75">
  <div id="ai-sum-loading" style="display:none;text-align:center;padding:24px 0;color:var(--t3)">
    <div style="display:inline-block;width:22px;height:22px;border:2px solid rgba(var(--acc-raw),.2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite"></div>
    <div style="margin-top:12px;font-size:12px">Thinking…</div>
  </div>
  <div id="ai-sum-text" style="white-space:pre-wrap;word-break:break-word"></div>
  <div id="ai-sum-error" style="display:none;color:var(--red);font-size:12px;line-height:1.6"></div>
</div>
