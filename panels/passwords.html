<div class="panel-head">
  <span class="panel-title">Passwords</span>
  <div class="pw-head-actions">
    <button id="pw-add-btn" title="Add entry" style="display:none">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <line x1="6.5" y1="2" x2="6.5" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="6.5" x2="11" y2="6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <button id="pw-lock-btn" title="Lock vault" style="display:none">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <rect x="2" y="5.5" width="9" height="6.5" rx="1.5" stroke="currentColor" stroke-width="1.1"/>
        <path d="M4.5 5.5V4a2 2 0 1 1 4 0v1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>
<!-- LOCK SCREEN -->
<div id="pw-lock-screen" class="pw-screen">
  <div class="pw-lock-icon">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
      <rect x="5" y="15" width="24" height="15" rx="3" stroke="currentColor" stroke-width="1.8"/>
      <path d="M11 15V11.5a6 6 0 1 1 12 0V15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="17" cy="22" r="2.2" fill="currentColor" opacity=".5"/>
      <line x1="17" y1="24" x2="17" y2="27" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
    </svg>
  </div>
  <div id="pw-lock-title" class="pw-lock-title">Unlock Vault</div>
  <div class="pw-lock-sub">Enter your master password</div>
  <input id="pw-master-input" class="pw-master-input" type="password" placeholder="Master password…" autocomplete="off" spellcheck="false"/>
  <div id="pw-lock-err" class="pw-lock-err"></div>
  <button id="pw-unlock-btn" class="pw-unlock-btn">Unlock</button>
  <div id="pw-setup-hint" class="pw-setup-hint" style="display:none">First use — this password encrypts your vault. Don't forget it.</div>
</div>
<!-- VAULT VIEW -->
<div id="pw-vault-screen" class="pw-screen" style="display:none">
  <div class="pw-search-wrap">
    <input id="pw-search" class="pw-search" type="text" placeholder="Search…" autocomplete="off" spellcheck="false"/>
  </div>
  <div id="pw-list" class="pw-list"></div>
  <div id="pw-empty" class="pw-empty" style="display:none">No saved passwords yet.<br>Click <b>+</b> above to add one.</div>
</div>
<!-- EDIT VIEW -->
<div id="pw-edit-screen" class="pw-screen" style="display:none">
  <div class="pw-edit-form">
    <label class="pw-lbl">Site / Domain</label>
    <input id="pw-f-domain" class="pw-fi" type="text" placeholder="example.com" autocomplete="off"/>
    <label class="pw-lbl">Username / Email</label>
    <input id="pw-f-user" class="pw-fi" type="text" placeholder="you@example.com" autocomplete="off"/>
    <label class="pw-lbl">Password</label>
    <div class="pw-pw-wrap">
      <input id="pw-f-pass" class="pw-fi" type="password" placeholder="Password" autocomplete="off"/>
      <button id="pw-f-show" class="pw-f-show" title="Show/hide">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1 6.5C2.5 3.5 4.5 2 6.5 2S10.5 3.5 12 6.5c-1.5 3-3.5 4.5-5.5 4.5S2.5 9.5 1 6.5Z" stroke="currentColor" stroke-width="1.1"/>
          <circle cx="6.5" cy="6.5" r="1.7" stroke="currentColor" stroke-width="1.1"/>
        </svg>
      </button>
      <button id="pw-gen-btn" class="pw-gen-btn" title="Generate strong password">GEN</button>
    </div>
    <label class="pw-lbl">Note <span style="opacity:.45;font-weight:400">(optional)</span></label>
    <input id="pw-f-note" class="pw-fi" type="text" placeholder="Any note…" autocomplete="off"/>
    <div class="pw-edit-btns">
      <button id="pw-save-btn" class="pw-save-btn">Save</button>
      <button id="pw-cancel-edit-btn" class="pw-cancel-btn">Cancel</button>
      <button id="pw-delete-btn" class="pw-delete-btn" style="display:none">Delete</button>
    </div>
  </div>
</div>
