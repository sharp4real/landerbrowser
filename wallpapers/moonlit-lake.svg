<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060c20"/>
      <stop offset="30%" stop-color="#0c1a3a"/>
      <stop offset="55%" stop-color="#142850"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
    <linearGradient id="lk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3060"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- distant mountains -->
  <polygon points="0,520 200,380 400,440 600,350 800,420 1000,360 1200,400 1400,340 1600,390 1800,360 1920,410 1920,600 0,600" fill="#0c1830" opacity=".8"/>
  <polygon points="0,560 300,420 500,480 700,400 900,460 1100,380 1300,440 1500,390 1700,430 1920,400 1920,600 0,600" fill="#0a1428" opacity=".9"/>
  <!-- lake -->
  <rect y="600" width="1920" height="480" fill="url(#lk)"/>
  <!-- moon -->
  <circle cx="1400" cy="140" r="45" fill="rgba(240,245,255,.65)"/>
  <circle cx="1400" cy="140" r="100" fill="rgba(200,220,255,.08)"/>
  <!-- moon reflection -->
  <ellipse cx="1400" cy="700" rx="8" ry="100" fill="rgba(200,220,255,.1)"/>
  <!-- shore trees silhouette -->
  <polygon points="80,600 95,500 110,600" fill="#060c18"/>
  <polygon points="130,600 150,480 170,600" fill="#060c18"/>
  <polygon points="200,600 218,510 236,600" fill="#060c18"/>
  <polygon points="1700,600 1720,490 1740,600" fill="#060c18"/>
  <polygon points="1760,600 1775,510 1790,600" fill="#060c18"/>
  <polygon points="1830,600 1850,480 1870,600" fill="#060c18"/>
  <!-- stars -->
  <circle cx="200" cy="80" r="1.5" fill="rgba(255,255,255,.5)"/>
  <circle cx="450" cy="50" r="1.2" fill="rgba(255,255,255,.4)"/>
  <circle cx="700" cy="110" r="1" fill="rgba(255,255,255,.35)"/>
  <circle cx="1000" cy="60" r="1.3" fill="rgba(255,255,255,.45)"/>
  <circle cx="1150" cy="160" r=".8" fill="rgba(255,255,255,.3)"/>
  <circle cx="600" cy="200" r="1" fill="rgba(255,255,255,.3)"/>
  <circle cx="1700" cy="90" r="1" fill="rgba(255,255,255,.35)"/>
  <circle cx="1600" cy="200" r=".8" fill="rgba(255,255,255,.25)"/>
</svg>