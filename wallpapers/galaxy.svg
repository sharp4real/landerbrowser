<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#030208"/>
      <stop offset="50%" stop-color="#0a0618"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="45%" r="12%">
      <stop offset="0%" stop-color="rgba(255,220,240,.15)"/>
      <stop offset="50%" stop-color="rgba(200,140,255,.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- galaxy spiral arms using ellipses -->
  <ellipse cx="960" cy="486" rx="500" ry="150" fill="rgba(180,120,255,.06)" transform="rotate(-25 960 486)"/>
