  <ellipse cx="960" cy="486" rx="500" ry="120" fill="rgba(140,100,220,.05)" transform="rotate(30 960 486)"/>
  <ellipse cx="960" cy="486" rx="350" ry="80" fill="rgba(180,140,255,.06)" transform="rotate(30 960 486)"/>
  <!-- core glow -->
  <rect width="1920" height="1080" fill="url(#core)"/>
  <circle cx="960" cy="486" r="40" fill="rgba(255,230,255,.08)"/>
  <circle cx="960" cy="486" r="20" fill="rgba(255,240,255,.1)"/>
