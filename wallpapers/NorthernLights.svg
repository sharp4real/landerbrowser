<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="40%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#1a2840"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00e676" stop-opacity=".25"/>
      <stop offset="60%" stop-color="#00bfa5" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0"/>
      <stop offset="40%" stop-color="#64ffda" stop-opacity=".2"/>
      <stop offset="70%" stop-color="#18ffff" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#64ffda" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora3" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7c4dff" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="snow1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0f8"/>
      <stop offset="100%" stop-color="#b8c8d8"/>
    </linearGradient>
    <linearGradient id="snow2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0dce8"/>
      <stop offset="100%" stop-color="#90a8c0"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3050" stop-opacity=".8"/>
      <stop offset="50%" stop-color="#102040"/>
      <stop offset="100%" stop-color="#0a1530"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="haze"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- Stars -->
  <g fill="#fff">
    <circle cx="120" cy="60" r="1.2" opacity=".7"/>
    <circle cx="350" cy="100" r="1" opacity=".5"/>
    <circle cx="500" cy="40" r="1.5" opacity=".6"/>
    <circle cx="700" cy="80" r="1" opacity=".4"/>
    <circle cx="850" cy="30" r="1.3" opacity=".65"/>
    <circle cx="1050" cy="70" r="1" opacity=".5"/>
    <circle cx="1200" cy="45" r="1.4" opacity=".55"/>
    <circle cx="1400" cy="90" r="1.1" opacity=".45"/>
    <circle cx="1550" cy="35" r="1.3" opacity=".6"/>
    <circle cx="1700" cy="75" r="1" opacity=".5"/>
    <circle cx="1850" cy="50" r="1.2" opacity=".55"/>
    <circle cx="250" cy="180" r=".8" opacity=".35"/>
    <circle cx="600" cy="150" r="1" opacity=".4"/>
    <circle cx="950" cy="120" r=".9" opacity=".3"/>
    <circle cx="1300" cy="160" r="1.1" opacity=".45"/>
    <circle cx="1650" cy="130" r=".8" opacity=".35"/>
  </g>
  <!-- Aurora Borealis -->
  <g filter="url(#glow)">
    <path d="M0 80 Q200 40 400 120 Q600 200 800 100 Q1000 0 1200 140 Q1400 280 1600 80 Q1800 -20 1920 100 L1920 400 Q1700 250 1500 350 Q1300 450 1100 300 Q900 150 700 350 Q500 400 300 280 Q100 160 0 300Z" fill="url(#aurora1)"/>
    <path d="M0 150 Q300 50 600 200 Q900 350 1200 150 Q1500 -50 1920 200 L1920 450 Q1600 280 1300 380 Q1000 480 700 300 Q400 120 0 350Z" fill="url(#aurora2)"/>
    <path d="M200 100 Q500 200 800 80 Q1100 -40 1400 160 Q1700 360 1920 150 L1920 350 Q1700 200 1400 300 Q1100 400 800 250 Q500 100 200 300Z" fill="url(#aurora3)"/>
  </g>
  <!-- Aurora vertical rays -->
  <g opacity=".12" filter="url(#softglow)">
    <rect x="400" y="0" width="3" height="300" fill="#00e676" rx="1.5"/>
    <rect x="520" y="20" width="2" height="250" fill="#64ffda" rx="1"/>
    <rect x="680" y="0" width="3" height="280" fill="#00e676" rx="1.5"/>
    <rect x="900" y="10" width="2" height="260" fill="#18ffff" rx="1"/>
    <rect x="1100" y="0" width="3" height="300" fill="#00e676" rx="1.5"/>
    <rect x="1300" y="30" width="2" height="240" fill="#7c4dff" rx="1"/>
    <rect x="1450" y="0" width="3" height="270" fill="#64ffda" rx="1.5"/>
  </g>
  <!-- Distant mountains (hazy) -->
  <g filter="url(#haze)" opacity=".6">
    <polygon points="0,580 200,380 400,500 600,340 800,480 1000,320 1200,450 1400,360 1600,470 1800,340 1920,420 1920,700 0,700" fill="#1a2840"/>
  </g>
  <!-- Snow mountains -->
  <polygon points="0,650 150,450 350,580 500,400 700,540 900,380 1050,500 1250,420 1400,530 1600,400 1800,520 1920,430 1920,750 0,750" fill="url(#snow2)"/>
  <!-- Snow caps -->
  <polygon points="500,400 560,460 440,460" fill="url(#snow1)"/>
  <polygon points="900,380 970,450 830,450" fill="url(#snow1)"/>
  <polygon points="1600,400 1670,465 1530,465" fill="url(#snow1)"/>
  <polygon points="150,450 210,510 90,510" fill="url(#snow1)"/>
  <polygon points="1250,420 1310,475 1190,475" fill="url(#snow1)"/>
  <!-- Near dark ridge -->
  <polygon points="0,720 200,620 400,700 600,600 800,690 1000,580 1200,670 1400,590 1600,680 1800,570 1920,650 1920,800 0,800" fill="#0d1520"/>
  <!-- Pine tree silhouettes -->
  <g fill="#080e18">
    <polygon points="100,720 106,670 112,720"/>
    <polygon points="120,720 128,660 136,720"/>
    <polygon points="150,720 156,680 162,720"/>
    <polygon points="1750,650 1758,590 1766,650"/>
    <polygon points="1780,650 1786,600 1792,650"/>
    <polygon points="1810,650 1820,580 1830,650"/>
    <polygon points="1850,650 1856,610 1862,650"/>
  </g>
  <!-- Lake -->
  <rect x="0" y="800" width="1920" height="280" fill="url(#lake)"/>
  <!-- Lake reflections of aurora -->
  <g opacity=".15" filter="url(#glow)">
    <ellipse cx="600" cy="900" rx="300" ry="100" fill="#00e676"/>
    <ellipse cx="1200" cy="920" rx="250" ry="80" fill="#64ffda"/>
    <ellipse cx="960" cy="880" rx="200" ry="60" fill="#7c4dff"/>
  </g>
  <!-- Mountain reflections in lake -->
  <g opacity=".15" transform="translate(0,1600) scale(1,-1)">
    <polygon points="0,650 150,450 350,580 500,400 700,540 900,380 1050,500 1250,420 1400,530 1600,400 1800,520 1920,430 1920,750 0,750" fill="#b8c8d8"/>
  </g>
</svg>