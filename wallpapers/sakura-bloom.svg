<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#201018"/>
      <stop offset="30%" stop-color="#5c2c40"/>
      <stop offset="55%" stop-color="#a05878"/>
      <stop offset="75%" stop-color="#c47898"/>
      <stop offset="100%" stop-color="#2c1420"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- cherry blossom trees -->
  <!-- Tree 1 (left) -->
  <rect x="280" y="500" width="20" height="580" fill="#3a1820"/>
  <path d="M290 500 Q240 450 200 300" stroke="#3a1820" fill="none" stroke-width="8"/>
  <path d="M290 520 Q340 460 380 320" stroke="#3a1820" fill="none" stroke-width="6"/>
  <path d="M290 480 Q220 400 180 350" stroke="#3a1820" fill="none" stroke-width="5"/>
  <circle cx="200" cy="280" r="40" fill="rgba(255,200,220,.25)"/>
  <circle cx="180" cy="320" r="35" fill="rgba(255,170,200,.2)"/>
  <circle cx="380" cy="300" r="38" fill="rgba(255,200,220,.22)"/>
  <circle cx="350" cy="340" r="30" fill="rgba(255,170,200,.18)"/>
  <circle cx="170" cy="340" r="25" fill="rgba(255,210,230,.15)"/>
  <circle cx="240" cy="260" r="30" fill="rgba(255,190,210,.2)"/>
  <!-- Tree 2 (right) -->
  <rect x="1580" y="450" width="22" height="630" fill="#3a1820"/>
  <path d="M1591 450 Q1530 380 1480 250" stroke="#3a1820" fill="none" stroke-width="8"/>
  <path d="M1591 470 Q1650 400 1700 280" stroke="#3a1820" fill="none" stroke-width="6"/>
  <circle cx="1480" cy="230" r="42" fill="rgba(255,200,220,.23)"/>
  <circle cx="1460" cy="270" r="35" fill="rgba(255,170,200,.18)"/>
  <circle cx="1700" cy="260" r="38" fill="rgba(255,200,220,.2)"/>
  <circle cx="1670" cy="300" r="30" fill="rgba(255,170,200,.16)"/>
  <circle cx="1540" cy="250" r="28" fill="rgba(255,210,230,.14)"/>
  <!-- falling petals -->
  <ellipse cx="400" cy="400" rx="5" ry="3" fill="rgba(255,200,220,.4)" transform="rotate(30 400 400)"/>
  <ellipse cx="600" cy="300" rx="4" ry="2.5" fill="rgba(255,180,210,.35)" transform="rotate(-20 600 300)"/>
  <ellipse cx="800" cy="450" rx="5" ry="3" fill="rgba(255,200,220,.3)" transform="rotate(45 800 450)"/>
  <ellipse cx="1000" cy="350" rx="4" ry="2.5" fill="rgba(255,190,210,.3)" transform="rotate(-35 1000 350)"/>
  <ellipse cx="1200" cy="500" rx="5" ry="3" fill="rgba(255,200,220,.25)" transform="rotate(20 1200 500)"/>
  <ellipse cx="1400" cy="400" rx="4" ry="2.5" fill="rgba(255,180,210,.3)" transform="rotate(-40 1400 400)"/>
  <ellipse cx="500" cy="600" rx="4" ry="2.5" fill="rgba(255,200,220,.2)" transform="rotate(50 500 600)"/>
  <ellipse cx="900" cy="550" rx="5" ry="3" fill="rgba(255,190,210,.22)" transform="rotate(-15 900 550)"/>
  <ellipse cx="1300" cy="600" rx="4" ry="2.5" fill="rgba(255,200,220,.2)" transform="rotate(35 1300 600)"/>
  <!-- ground -->
  <path d="M0 850 Q400 830 800 850 Q1200 870 1600 850 Q1800 840 1920 850 L1920 1080 0 1080" fill="rgba(100,35,60,.4)"/>
  <!-- small grass tufts -->
  <path d="M500 860 Q510 840 520 860" stroke="rgba(80,30,50,.3)" fill="none" stroke-width="2"/>
  <path d="M1000 850 Q1010 830 1020 850" stroke="rgba(80,30,50,.3)" fill="none" stroke-width="2"/>
  <path d="M1500 855 Q1510 835 1520 855" stroke="rgba(80,30,50,.3)" fill="none" stroke-width="2"/>
</svg>