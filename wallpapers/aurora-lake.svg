<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f2040"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(0,255,100,.05)"/>
      <stop offset="50%" stop-color="rgba(0,200,150,.12)"/>
      <stop offset="100%" stop-color="rgba(0,100,255,.05)"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(100,0,255,.04)"/>
      <stop offset="50%" stop-color="rgba(0,255,180,.10)"/>
      <stop offset="100%" stop-color="rgba(0,200,100,.04)"/>
    </linearGradient>
    <radialGradient id="lake" cx="50%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#0e2545"/>
      <stop offset="100%" stop-color="#081830"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- aurora bands -->
  <ellipse cx="960" cy="200" rx="900" ry="180" fill="url(#aurora1)"/>
  <ellipse cx="700" cy="280" rx="700" ry="120" fill="url(#aurora2)"/>
  <ellipse cx="1200" cy="250" rx="600" ry="100" fill="rgba(0,255,130,.06)"/>
  <ellipse cx="500" cy="220" rx="500" ry="90" fill="rgba(0,200,180,.05)"/>
  <!-- stars -->
  <circle cx="120" cy="80" r="1.5" fill="rgba(255,255,255,.7)"/>
  <circle cx="340" cy="50" r="1" fill="rgba(255,255,255,.5)"/>
  <circle cx="560" cy="120" r="1.2" fill="rgba(255,255,255,.6)"/>
  <circle cx="780" cy="40" r="1.5" fill="rgba(255,255,255,.7)"/>
  <circle cx="1000" cy="90" r="1" fill="rgba(255,255,255,.5)"/>
  <circle cx="1200" cy="60" r="1.3" fill="rgba(255,255,255,.65)"/>
  <circle cx="1400" cy="100" r="1" fill="rgba(255,255,255,.5)"/>
  <circle cx="1600" cy="50" r="1.5" fill="rgba(255,255,255,.7)"/>
  <circle cx="1800" cy="80" r="1.2" fill="rgba(255,255,255,.6)"/>
  <circle cx="250" cy="150" r="1" fill="rgba(255,255,255,.45)"/>
  <circle cx="1500" cy="150" r="1.3" fill="rgba(255,255,255,.55)"/>
  <!-- mountains -->
  <polygon points="0,650 200,420 400,650" fill="#0d1e35"/>
  <polygon points="300,650 550,350 800,650" fill="#0f2240"/>
  <polygon points="700,650 950,380 1200,650" fill="#0d1e35"/>
  <polygon points="1100,650 1350,400 1600,650" fill="#0f2240"/>
  <polygon points="1450,650 1700,430 1920,650" fill="#0d1e35"/>
  <!-- lake -->
  <rect x="0" y="650" width="1920" height="430" fill="url(#lake)"/>
  <!-- lake reflections -->
  <ellipse cx="960" cy="750" rx="800" ry="60" fill="rgba(0,255,130,.03)"/>
  <ellipse cx="700" cy="780" rx="500" ry="40" fill="rgba(0,200,180,.02)"/>
  <line x1="200" y1="700" x2="250" y2="700" stroke="rgba(0,255,150,.06)" stroke-width="1"/>
  <line x1="600" y1="730" x2="680" y2="730" stroke="rgba(0,200,180,.05)" stroke-width="1"/>
  <line x1="1100" y1="710" x2="1200" y2="710" stroke="rgba(0,255,130,.06)" stroke-width="1"/>
  <line x1="1500" y1="740" x2="1570" y2="740" stroke="rgba(0,200,150,.05)" stroke-width="1"/>
</svg>