<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#1a2535"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- circuit traces -->
  <!-- horizontal -->
  <line x1="0" y1="100" x2="400" y2="100" stroke="rgba(0,255,200,.06)" stroke-width="1.5"/>
  <line x1="500" y1="100" x2="800" y2="100" stroke="rgba(0,255,200,.08)" stroke-width="1.5"/>
  <line x1="900" y1="100" x2="1920" y2="100" stroke="rgba(0,255,200,.05)" stroke-width="1.5"/>
  <line x1="0" y1="300" x2="600" y2="300" stroke="rgba(0,255,200,.07)" stroke-width="1.5"/>
  <line x1="700" y1="300" x2="1200" y2="300" stroke="rgba(0,255,200,.06)" stroke-width="1.5"/>
  <line x1="1300" y1="300" x2="1920" y2="300" stroke="rgba(0,255,200,.08)" stroke-width="1.5"/>
  <line x1="0" y1="500" x2="300" y2="500" stroke="rgba(0,255,200,.08)" stroke-width="1.5"/>
  <line x1="400" y1="500" x2="900" y2="500" stroke="rgba(0,255,200,.05)" stroke-width="1.5"/>
  <line x1="1000" y1="500" x2="1500" y2="500" stroke="rgba(0,255,200,.07)" stroke-width="1.5"/>
  <line x1="1600" y1="500" x2="1920" y2="500" stroke="rgba(0,255,200,.06)" stroke-width="1.5"/>
  <line x1="0" y1="700" x2="500" y2="700" stroke="rgba(0,255,200,.06)" stroke-width="1.5"/>
  <line x1="600" y1="700" x2="1100" y2="700" stroke="rgba(0,255,200,.08)" stroke-width="1.5"/>
  <line x1="1200" y1="700" x2="1920" y2="700" stroke="rgba(0,255,200,.05)" stroke-width="1.5"/>
  <line x1="0" y1="900" x2="700" y2="900" stroke="rgba(0,255,200,.07)" stroke-width="1.5"/>
  <line x1="800" y1="900" x2="1400" y2="900" stroke="rgba(0,255,200,.06)" stroke-width="1.5"/>
  <line x1="1500" y1="900" x2="1920" y2="900" stroke="rgba(0,255,200,.08)" stroke-width="1.5"/>
