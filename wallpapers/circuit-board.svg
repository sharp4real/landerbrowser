  <line x1="1200" y1="0" x2="1200" y2="300" stroke="rgba(0,255,200,.06)" stroke-width="1.5"/>
  <line x1="1200" y1="400" x2="1200" y2="700" stroke="rgba(0,255,200,.08)" stroke-width="1.5"/>
  <line x1="1600" y1="100" x2="1600" y2="500" stroke="rgba(0,255,200,.05)" stroke-width="1.5"/>
  <line x1="1600" y1="600" x2="1600" y2="1080" stroke="rgba(0,255,200,.07)" stroke-width="1.5"/>
  <line x1="200" y1="300" x2="200" y2="700" stroke="rgba(0,255,200,.06)" stroke-width="1.5"/>
  <line x1="600" y1="0" x2="600" y2="300" stroke="rgba(0,255,200,.07)" stroke-width="1.5"/>
  <line x1="600" y1="500" x2="600" y2="700" stroke="rgba(0,255,200,.05)" stroke-width="1.5"/>
  <line x1="1000" y1="300" x2="1000" y2="500" stroke="rgba(0,255,200,.08)" stroke-width="1.5"/>
  <line x1="1000" y1="700" x2="1000" y2="1080" stroke="rgba(0,255,200,.06)" stroke-width="1.5"/>
  <line x1="1400" y1="0" x2="1400" y2="500" stroke="rgba(0,255,200,.05)" stroke-width="1.5"/>
  <line x1="1400" y1="700" x2="1400" y2="900" stroke="rgba(0,255,200,.07)" stroke-width="1.5"/>
  <!-- nodes/junctions -->
  <circle cx="400" cy="100" r="4" fill="rgba(0,255,200,.12)"/>
  <circle cx="800" cy="100" r="4" fill="rgba(0,255,200,.10)"/>
  <circle cx="400" cy="300" r="5" fill="rgba(0,255,200,.14)"/>
  <circle cx="600" cy="300" r="4" fill="rgba(0,255,200,.10)"/>
  <circle cx="1200" cy="300" r="5" fill="rgba(0,255,200,.12)"/>
  <circle cx="400" cy="500" r="4" fill="rgba(0,255,200,.10)"/>
  <circle cx="800" cy="500" r="5" fill="rgba(0,255,200,.14)"/>
  <circle cx="1000" cy="500" r="4" fill="rgba(0,255,200,.10)"/>
  <circle cx="1600" cy="500" r="5" fill="rgba(0,255,200,.12)"/>
  <circle cx="200" cy="700" r="4" fill="rgba(0,255,200,.10)"/>
  <circle cx="600" cy="700" r="5" fill="rgba(0,255,200,.14)"/>
  <circle cx="1200" cy="700" r="4" fill="rgba(0,255,200,.10)"/>
  <circle cx="800" cy="900" r="5" fill="rgba(0,255,200,.12)"/>
  <circle cx="1400" cy="900" r="4" fill="rgba(0,255,200,.10)"/>
  <!-- IC chips -->
  <rect x="380" y="480" width="40" height="40" rx="3" fill="none" stroke="rgba(0,255,200,.10)" stroke-width="1.5"/>
  <rect x="1180" y="280" width="40" height="40" rx="3" fill="none" stroke="rgba(0,255,200,.10)" stroke-width="1.5"/>
  <rect x="780" y="880" width="40" height="40" rx="3" fill="none" stroke="rgba(0,255,200,.10)" stroke-width="1.5"/>
</svg>