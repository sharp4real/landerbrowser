<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a28"/>
      <stop offset="100%" stop-color="#0e2438"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- constellation lines -->
  <!-- Orion-like -->
  <line x1="300" y1="200" x2="350" y2="300" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="350" y1="300" x2="280" y2="400" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="350" y1="300" x2="420" y2="400" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="280" y1="400" x2="250" y2="500" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="420" y1="400" x2="450" y2="500" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <circle cx="300" cy="200" r="2.5" fill="rgba(200,220,255,.7)"/>
  <circle cx="350" cy="300" r="2" fill="rgba(200,220,255,.6)"/>
  <circle cx="280" cy="400" r="2.5" fill="rgba(200,220,255,.7)"/>
  <circle cx="420" cy="400" r="2" fill="rgba(200,220,255,.6)"/>
  <circle cx="250" cy="500" r="2.5" fill="rgba(200,220,255,.7)"/>
  <circle cx="450" cy="500" r="2" fill="rgba(200,220,255,.6)"/>
  <!-- Big dipper-like -->
  <line x1="800" y1="150" x2="900" y2="180" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="900" y1="180" x2="1000" y2="160" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="1000" y1="160" x2="1050" y2="250" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="1050" y1="250" x2="970" y2="280" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="970" y1="280" x2="900" y2="260" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="900" y1="260" x2="900" y2="180" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="800" y1="150" x2="700" y2="120" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <circle cx="800" cy="150" r="2" fill="rgba(200,220,255,.6)"/>
  <circle cx="900" cy="180" r="2.5" fill="rgba(200,220,255,.7)"/>
  <circle cx="1000" cy="160" r="2" fill="rgba(200,220,255,.6)"/>
  <circle cx="1050" cy="250" r="2.5" fill="rgba(200,220,255,.7)"/>
  <circle cx="970" cy="280" r="2" fill="rgba(200,220,255,.6)"/>
  <circle cx="900" cy="260" r="2.5" fill="rgba(200,220,255,.7)"/>
  <circle cx="700" cy="120" r="2" fill="rgba(200,220,255,.6)"/>
  <!-- Triangle -->
  <line x1="1400" y1="400" x2="1550" y2="350" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="1550" y1="350" x2="1500" y2="500" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="1500" y1="500" x2="1400" y2="400" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <circle cx="1400" cy="400" r="2.5" fill="rgba(200,220,255,.7)"/>
  <circle cx="1550" cy="350" r="2" fill="rgba(200,220,255,.6)"/>
  <circle cx="1500" cy="500" r="2.5" fill="rgba(200,220,255,.7)"/>
  <!-- Cassiopeia-like -->
  <line x1="600" y1="600" x2="680" y2="560" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="680" y1="560" x2="750" y2="620" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="750" y1="620" x2="830" y2="570" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <line x1="830" y1="570" x2="900" y2="630" stroke="rgba(150,200,255,.08)" stroke-width="1"/>
  <circle cx="600" cy="600" r="2" fill="rgba(200,220,255,.6)"/>
  <circle cx="680" cy="560" r="2.5" fill="rgba(200,220,255,.7)"/>
  <circle cx="750" cy="620" r="2" fill="rgba(200,220,255,.6)"/>
  <circle cx="830" cy="570" r="2.5" fill="rgba(200,220,255,.7)"/>
  <circle cx="900" cy="630" r="2" fill="rgba(200,220,255,.6)"/>
  <!-- scattered stars -->
  <circle cx="100" cy="50" r="1" fill="rgba(255,255,255,.5)"/>
  <circle cx="200" cy="800" r="1.2" fill="rgba(255,255,255,.55)"/>
  <circle cx="500" cy="900" r="1" fill="rgba(255,255,255,.5)"/>
  <circle cx="1100" cy="700" r="1.5" fill="rgba(255,255,255,.6)"/>
  <circle cx="1300" cy="800" r="1" fill="rgba(255,255,255,.5)"/>
  <circle cx="1600" cy="700" r="1.2" fill="rgba(255,255,255,.55)"/>
  <circle cx="1800" cy="900" r="1" fill="rgba(255,255,255,.5)"/>
  <circle cx="1700" cy="150" r="1.5" fill="rgba(255,255,255,.6)"/>
  <circle cx="160" cy="450" r="1" fill="rgba(255,255,255,.5)"/>
  <circle cx="1250" cy="550" r="1.2" fill="rgba(255,255,255,.55)"/>
  <!-- milky way band -->
  <ellipse cx="960" cy="540" rx="1200" ry="80" fill="rgba(150,180,220,.03)" transform="rotate(-15 960 540)"/>
</svg>