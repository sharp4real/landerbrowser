<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010820"/>
      <stop offset="35%" stop-color="#04184a"/>
      <stop offset="60%" stop-color="#063068"/>
      <stop offset="100%" stop-color="#041838"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a5090"/>
      <stop offset="40%" stop-color="#063068"/>
      <stop offset="100%" stop-color="#010c1e"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="8%" r="6%">
      <stop offset="0%" stop-color="rgba(200,220,255,.7)"/>
      <stop offset="40%" stop-color="rgba(140,180,255,.2)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect y="480" width="1920" height="600" fill="url(#water)"/>
  <ellipse cx="960" cy="86" rx="38" ry="38" fill="rgba(200,220,255,.65)" opacity=".9"/>
  <ellipse cx="960" cy="86" rx="80" ry="80" fill="rgba(140,180,255,.12)"/>
  <!-- moon reflection on water -->
  <ellipse cx="960" cy="540" rx="6" ry="60" fill="rgba(180,210,255,.12)"/>
  <ellipse cx="960" cy="600" rx="10" ry="80" fill="rgba(140,180,255,.08)"/>
  <ellipse cx="960" cy="700" rx="18" ry="120" fill="rgba(100,160,255,.05)"/>
  <!-- wave lines -->
  <path d="M0 490 Q240 478 480 490 T960 490 T1440 490 T1920 490" stroke="rgba(120,180,255,.12)" fill="none" stroke-width="1.5"/>
  <path d="M0 520 Q240 512 480 520 T960 520 T1440 520 T1920 520" stroke="rgba(100,160,255,.08)" fill="none" stroke-width="1"/>
  <path d="M0 560 Q240 554 480 560 T960 560 T1440 560 T1920 560" stroke="rgba(80,140,255,.06)" fill="none" stroke-width="1"/>
  <!-- stars -->
  <circle cx="150" cy="60" r="1.5" fill="rgba(255,255,255,.6)"/>
  <circle cx="320" cy="120" r="1" fill="rgba(255,255,255,.4)"/>
  <circle cx="500" cy="45" r="1.8" fill="rgba(255,255,255,.5)"/>
  <circle cx="700" cy="150" r="1" fill="rgba(255,255,255,.35)"/>
  <circle cx="1200" cy="80" r="1.5" fill="rgba(255,255,255,.5)"/>
  <circle cx="1400" cy="130" r="1" fill="rgba(255,255,255,.3)"/>
  <circle cx="1600" cy="55" r="1.3" fill="rgba(255,255,255,.45)"/>
  <circle cx="1750" cy="170" r="1" fill="rgba(255,255,255,.4)"/>
  <circle cx="400" cy="200" r=".8" fill="rgba(255,255,255,.3)"/>
  <circle cx="1100" cy="180" r=".8" fill="rgba(255,255,255,.25)"/>
</svg>