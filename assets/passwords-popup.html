<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>Passwords</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#080808;--bg1:#0c0c0c;--bg2:#111111;--bg3:#181818;--bg4:#202020;--bg5:#282828;
  --ln:rgba(255,255,255,.06);--ln2:rgba(255,255,255,.10);
  --t0:rgba(255,255,255,.92);--t1:rgba(255,255,255,.65);--t2:rgba(255,255,255,.40);--t3:rgba(255,255,255,.22);
  --acc:rgba(255,255,255,.85);--acc-raw:255,255,255;--acc-f:rgba(255,255,255,.07);
  --red:#f87171;--grn:#22c55e;--ylw:#fbbf24;
  --f:'Geist',ui-sans-serif,system-ui,sans-serif;
}
html,body{width:300px;height:440px;background:transparent;font-family:var(--f);font-size:13px;user-select:none;overflow:hidden;color:var(--t0);}
body{padding:8px;}
@keyframes popupSlideIn{from{opacity:0;transform:translateY(6px) scale(.98);}to{opacity:1;transform:none;}}
.card{background:var(--bg1);border-radius:14px;border:1px solid var(--ln2);overflow:hidden;box-shadow:none;display:flex;flex-direction:column;height:100%;animation:popupSlideIn .22s cubic-bezier(.22,1,.36,1) both;backdrop-filter:blur(2px);}
.card-hdr{display:flex;align-items:center;gap:9px;padding:11px 14px;background:var(--bg2);border-bottom:1px solid var(--ln);-webkit-app-region:drag;cursor:grab;flex-shrink:0;}
.card-hdr *{-webkit-app-region:no-drag;}
.card-hdr-ico{width:28px;height:28px;border-radius:8px;background:rgba(var(--acc-raw),.08);border:1px solid rgba(var(--acc-raw),.15);display:flex;align-items:center;justify-content:center;color:var(--acc);flex-shrink:0;transition:background .15s;}
.card-title{flex:1;font-size:12px;font-weight:700;color:var(--t0);letter-spacing:-.01em;}

.scr{display:none;flex:1;flex-direction:column;overflow:hidden;}
.scr.active{display:flex;}

/* Lock screen */
.lock-body{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px;}
.lock-icon{width:48px;height:48px;border-radius:14px;background:var(--acc-f);border:1px solid var(--ln2);display:flex;align-items:center;justify-content:center;color:var(--t2);margin-bottom:16px;}
.lock-label{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:10px;}
.lock-input{width:100%;background:var(--bg3);border:1px solid var(--ln);border-radius:9px;color:var(--t0);font:13px var(--f);padding:9px 12px;outline:none;transition:border-color .12s;letter-spacing:.05em;}
.lock-input:focus{border-color:rgba(var(--acc-raw),.3);}
.lock-input.err{border-color:var(--red);animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.lock-btn{width:100%;margin-top:10px;padding:9px;background:rgba(var(--acc-raw),.07);border:1px solid rgba(var(--acc-raw),.12);border-radius:9px;color:var(--acc);font:600 12px var(--f);cursor:pointer;transition:all .12s;}
.lock-btn:hover{background:rgba(var(--acc-raw),.12);border-color:rgba(var(--acc-raw),.2);}
.lock-hint{font-size:10px;color:var(--t3);margin-top:8px;text-align:center;line-height:1.5;}
.lock-err{font-size:10px;color:var(--red);margin-top:6px;text-align:center;}

/* Vault screen */
.vlt-search-row{padding:7px 11px;border-bottom:1px solid var(--ln);flex-shrink:0;}
.vlt-search-wrap{position:relative;}
.vlt-search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;}
.vlt-search{width:100%;background:var(--bg3);border:1px solid var(--ln);border-radius:8px;color:var(--t1);font:12px var(--f);padding:6px 10px 6px 28px;outline:none;transition:border-color .12s;}
.vlt-search:focus{border-color:rgba(var(--acc-raw),.3);}
.vlt-toolbar{display:flex;align-items:center;justify-content:flex-end;padding:5px 11px;gap:5px;flex-shrink:0;border-bottom:1px solid var(--ln);}
.vlt-btn{background:transparent;border:1px solid var(--ln);border-radius:7px;color:var(--t2);cursor:pointer;padding:4px 8px;font:10px var(--f);font-weight:600;display:flex;align-items:center;gap:4px;transition:all .12s;}
.vlt-btn:hover{border-color:rgba(var(--acc-raw),.3);color:var(--acc);background:var(--acc-f);}
.vlt-btn.danger:hover{border-color:rgba(248,113,113,.3);color:var(--red);background:rgba(248,113,113,.07);}
.vlt-list{flex:1;overflow-y:auto;padding:3px 0;}
.vlt-list::-webkit-scrollbar{width:3px;}
.vlt-list::-webkit-scrollbar-thumb{background:var(--ln2);border-radius:3px;}
.vlt-list::-webkit-scrollbar-track{background:transparent;}
.vlt-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;transition:background .1s;}
.vlt-item:hover{background:var(--acc-f);}
.vlt-item:hover .vlt-itm-del{opacity:1;}
.vlt-item-ico{width:22px;height:22px;border-radius:6px;background:var(--bg4);border:1px solid var(--ln);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;color:var(--t3);}
.vlt-item-body{flex:1;min-width:0;}
.vlt-item-dmn{font-size:11.5px;font-weight:600;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vlt-item-usr{font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vlt-itm-del{opacity:0;background:transparent;border:none;color:var(--t3);cursor:pointer;padding:3px 6px;border-radius:5px;font-size:14px;transition:all .12s;}
.vlt-itm-del:hover{background:rgba(248,113,113,.12);color:var(--red);}
.vlt-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--t3);font-size:11px;}

/* Edit screen */
.edt-body{flex:1;overflow-y:auto;padding:10px 12px;}
.edt-body::-webkit-scrollbar{width:3px;}
.edt-body::-webkit-scrollbar-thumb{background:var(--ln2);border-radius:3px;}
.edt-field{margin-bottom:9px;}
.edt-lbl{font-size:10px;font-weight:600;color:var(--t3);margin-bottom:3px;}
.edt-input{width:100%;background:var(--bg3);border:1px solid var(--ln);border-radius:8px;color:var(--t1);font:12px var(--f);padding:7px 10px;outline:none;resize:vertical;transition:border-color .12s;}
.edt-input:focus{border-color:rgba(var(--acc-raw),.3);}
.edt-pass-row{display:flex;gap:5px;}
.edt-pass-row .edt-input{flex:1;}
.edt-eye{background:var(--bg3);border:1px solid var(--ln);border-radius:8px;color:var(--t3);cursor:pointer;padding:7px 8px;font:10px var(--f);display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;}
.edt-eye:hover{border-color:rgba(var(--acc-raw),.2);color:var(--acc);}
.edt-foot{display:flex;gap:6px;padding:8px 11px;border-top:1px solid var(--ln);flex-shrink:0;}
.edt-save{flex:1;padding:8px;background:rgba(var(--acc-raw),.07);border:1px solid rgba(var(--acc-raw),.12);border-radius:8px;color:var(--acc);font:600 11px var(--f);cursor:pointer;transition:all .12s;}
.edt-save:hover{background:rgba(var(--acc-raw),.12);border-color:rgba(var(--acc-raw),.2);}
.edt-back{padding:8px 12px;background:transparent;border:1px solid var(--ln);border-radius:8px;color:var(--t2);font:600 11px var(--f);cursor:pointer;transition:all .12s;}
.edt-back:hover{border-color:rgba(var(--acc-raw),.25);color:var(--acc);}
.edt-del{padding:8px 10px;background:transparent;border:1px solid rgba(248,113,113,.2);border-radius:8px;color:var(--red);font:600 11px var(--f);cursor:pointer;transition:all .12s;}
.edt-del:hover{background:rgba(248,113,113,.1);}

/* Toast */
.toast-box{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg4);border:1px solid var(--ln2);border-radius:8px;padding:7px 14px;font-size:11px;color:var(--t0);white-space:nowrap;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;z-index:9999;}
.toast-box.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="card">
  <div class="card-hdr">
    <div class="card-hdr-ico">
      <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><rect x="2.5" y="5" width="7" height="5.5" rx="1.2" stroke="currentColor" stroke-width="1.2"/><path d="M4.5 5V3.5a1.5 1.5 0 0 1 3 0V5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="6" cy="7.5" r=".6" fill="currentColor"/></svg>
    </div>
    <span class="card-title" id="pws-title">Passwords</span>
  </div>

  <!-- Lock screen -->
  <div class="scr active" id="scr-lock">
    <div class="lock-body">
      <div class="lock-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="11" rx="2.4" stroke="currentColor" stroke-width="1.4"/><path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="12" cy="16.5" r="1.2" fill="currentColor"/></svg>
      </div>
      <div class="lock-label" id="lock-label">Enter master password</div>
      <input class="lock-input" id="lock-input" type="password" placeholder="Master password…" autocomplete="current-password">
      <button class="lock-btn" id="lock-btn">Unlock</button>
      <div class="lock-hint" id="lock-hint"></div>
      <div class="lock-err" id="lock-err"></div>
    </div>
  </div>

  <!-- Vault screen -->
  <div class="scr" id="scr-vault">
    <div class="vlt-search-row">
      <div class="vlt-search-wrap">
        <svg class="vlt-search-ico" width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.2"/><path d="M7.5 7.5L10 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <input class="vlt-search" id="vlt-search" type="text" placeholder="Search vault…" autocomplete="off">
      </div>
    </div>
    <div class="vlt-toolbar">
      <button class="vlt-btn" id="vlt-add-btn">
        <svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M5 1v8M1 5h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Add
      </button>
      <button class="vlt-btn danger" id="vlt-lock-btn">
        <svg width="9" height="9" viewBox="0 0 10 10" fill="none"><rect x="1.5" y="4.5" width="7" height="5" rx="1.2" stroke="currentColor" stroke-width="1.2"/><path d="M3 4.5V3a2 2 0 0 1 4 0v1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Lock
      </button>
    </div>
    <div class="vlt-list" id="vlt-list"></div>
  </div>

  <!-- Edit screen -->
  <div class="scr" id="scr-edit">
    <div class="edt-body">
      <div class="edt-field">
        <div class="edt-lbl">Domain / Website</div>
        <input class="edt-input" id="edt-dmn" type="text" placeholder="example.com" autocomplete="off">
      </div>
      <div class="edt-field">
        <div class="edt-lbl">Username</div>
        <input class="edt-input" id="edt-usr" type="text" placeholder="Username or email" autocomplete="off">
      </div>
      <div class="edt-field">
        <div class="edt-lbl">Password</div>
        <div class="edt-pass-row">
          <input class="edt-input" id="edt-pass" type="password" placeholder="Password" autocomplete="off">
          <button class="edt-eye" id="edt-eye" title="Show/hide">
            <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><ellipse cx="6" cy="6" rx="4.5" ry="3" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="6" r="1.2" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
      <div class="edt-field">
        <div class="edt-lbl">Notes (optional)</div>
        <textarea class="edt-input" id="edt-note" rows="3" placeholder="Notes…" style="min-height:54px"></textarea>
      </div>
    </div>
    <div class="edt-foot">
      <button class="edt-back" id="edt-back">Back</button>
      <button class="edt-save" id="edt-save">Save</button>
      <button class="edt-del" id="edt-del" style="display:none">Delete</button>
    </div>
  </div>
</div>

<div class="toast-box" id="toast"></div>

<script>
const { ipcRenderer } = require('electron');
ipcRenderer.on('popup:theme', (_, t) => {
  if (!t) return;
  const r = document.documentElement.style;
  Object.entries(t).forEach(([k, v]) => { if (v && k !== 'f') r.setProperty('--' + k, v); });
  if (t.accRaw || t['acc-raw']) r.setProperty('--acc-raw', t.accRaw || t['acc-raw']);
});

const SALT_KEY    = 'rb-vault-salt';
const VAULT_KEY   = 'rb-vault-v1';
const SENTINEL    = 'rb-vault-ok';

let _key = null;
let _vault = [];
let _editIdx = -1;
let _vltQuery = '';

// ---- Crypto ----
async function getSalt() {
  let s = localStorage.getItem(SALT_KEY);
  if (!s) {
    const arr = crypto.getRandomValues(new Uint8Array(32));
    s = btoa(String.fromCharCode(...arr));
    localStorage.setItem(SALT_KEY, s);
  }
  const raw = Uint8Array.from(atob(s), c => c.charCodeAt(0));
  return raw;
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const base = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:200000, hash:'SHA-256' },
    base, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}

async function aeEncrypt(key, txt) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(txt));
  const combined = new Uint8Array(iv.byteLength + ct.byteLength);
  combined.set(iv, 0);
  combined.set(new Uint8Array(ct), iv.byteLength);
  return btoa(String.fromCharCode(...combined));
}

async function aeDecrypt(key, str) {
  const raw = Uint8Array.from(atob(str), c => c.charCodeAt(0));
  const iv = raw.slice(0, 12);
  const ct = raw.slice(12);
  const dec = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(dec);
}

async function isSetup() {
  return !!localStorage.getItem(VAULT_KEY);
}

async function _saveVault(key, vault) {
  const json = JSON.stringify({ check: SENTINEL, entries: vault });
  const enc = await aeEncrypt(key, json);
  localStorage.setItem(VAULT_KEY, enc);
}

async function _loadVault(key) {
  const enc = localStorage.getItem(VAULT_KEY);
  if (!enc) return [];
  try {
    const dec = await aeDecrypt(key, enc);
    const obj = JSON.parse(dec);
    if (obj.check !== SENTINEL) throw new Error('bad sentinel');
    return Array.isArray(obj.entries) ? obj.entries : [];
  } catch {
    throw new Error('wrong password');
  }
}

// ---- Toast ----
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.classList.remove('show'); }, 2200);
}

// ---- Screens ----
function _show(id) {
  document.querySelectorAll('.scr').forEach(s => s.classList.toggle('active', s.id === id));
  const titles = { 'scr-lock':'Passwords', 'scr-vault':'Vault', 'scr-edit': _editIdx < 0 ? 'Add Password' : 'Edit Password' };
  const t = document.getElementById('pws-title');
  if (t) t.textContent = titles[id] || 'Passwords';
}

// ---- Lock screen ----
async function _tryUnlock() {
  const errEl = document.getElementById('lock-err');
  const input = document.getElementById('lock-input');
  const pw = input ? input.value.trim() : '';
  if (!pw) return;
  if (errEl) errEl.textContent = '';
  try {
    const salt = await getSalt();
    const key  = await deriveKey(pw, salt);
    const setup = await isSetup();
    if (!setup) {
      _key = key;
      _vault = [];
      await _saveVault(_key, _vault);
      _show('scr-vault');
      renderVault();
      toast('Vault created — master password set');
    } else {
      const entries = await _loadVault(key);
      _key = key;
      _vault = entries;
      _show('scr-vault');
      renderVault();
    }
  } catch {
    if (input) { input.classList.add('err'); setTimeout(() => input.classList.remove('err'), 400); }
    if (errEl) errEl.textContent = 'Wrong password';
  }
}

const lockInput = document.getElementById('lock-input');
const lockBtn   = document.getElementById('lock-btn');
const lockHint  = document.getElementById('lock-hint');

if (lockInput) {
  lockInput.addEventListener('keydown', e => { if (e.key === 'Enter') _tryUnlock(); });
}
if (lockBtn) lockBtn.addEventListener('click', _tryUnlock);

(async function initLock() {
  const setup = await isSetup();
  if (lockHint) lockHint.textContent = setup ? '' : 'No vault yet — enter a master password to create one.';
  const lockLabel = document.getElementById('lock-label');
  if (lockLabel) lockLabel.textContent = setup ? 'Enter master password' : 'Create master password';
})();

// ---- Vault ----
function renderVault() {
  const list = document.getElementById('vlt-list');
  if (!list) return;
  const q = _vltQuery.toLowerCase().trim();
  const shown = q ? _vault.filter(e => (e.domain||'').toLowerCase().includes(q)||(e.username||'').toLowerCase().includes(q)) : _vault;
  if (!shown.length) {
    list.innerHTML = '<div class="vlt-empty"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="11" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg><span>' + (q ? 'No results' : 'No passwords saved') + '</span></div>';
    return;
  }
  list.innerHTML = shown.map((e, i) => {
    const realIdx = _vault.indexOf(e);
    const ico = e.domain ? e.domain.slice(0,2).toUpperCase() : '••';
    return `<div class="vlt-item" data-idx="${realIdx}">
      <div class="vlt-item-ico">${ico}</div>
      <div class="vlt-item-body">
        <div class="vlt-item-dmn">${(e.domain||'?').replace(/</g,'&lt;')}</div>
        <div class="vlt-item-usr">${(e.username||'—').replace(/</g,'&lt;')}</div>
      </div>
      <button class="vlt-itm-del" data-idx="${realIdx}" title="Delete">×</button>
    </div>`;
  }).join('');
  list.querySelectorAll('.vlt-item').forEach(el => {
    el.addEventListener('click', function(e) {
      if (e.target.closest('.vlt-itm-del')) return;
      _editEntry(parseInt(this.dataset.idx));
    });
  });
  list.querySelectorAll('.vlt-itm-del').forEach(btn => {
    btn.addEventListener('click', async function(e) {
      e.stopPropagation();
      const idx = parseInt(this.dataset.idx);
      _vault.splice(idx, 1);
      await _saveVault(_key, _vault);
      renderVault();
      toast('Entry deleted');
    });
  });
}

const vltSearch = document.getElementById('vlt-search');
const vltAddBtn = document.getElementById('vlt-add-btn');
const vltLockBtn = document.getElementById('vlt-lock-btn');
if (vltSearch) vltSearch.addEventListener('input', function() { _vltQuery = this.value; renderVault(); });
if (vltAddBtn) vltAddBtn.addEventListener('click', () => _editEntry(-1));
if (vltLockBtn) vltLockBtn.addEventListener('click', () => { _key = null; _vault = []; _show('scr-lock'); if (lockInput) lockInput.value = ''; });

// ---- Edit ----
function _editEntry(idx) {
  _editIdx = idx;
  const e = idx >= 0 ? _vault[idx] : null;
  const dmnEl = document.getElementById('edt-dmn'), usrEl = document.getElementById('edt-usr'),
        pasEl = document.getElementById('edt-pass'), noteEl = document.getElementById('edt-note'),
        delEl = document.getElementById('edt-del');
  if (dmnEl) dmnEl.value = e ? (e.domain||'') : '';
  if (usrEl) usrEl.value = e ? (e.username||'') : '';
  if (pasEl) { pasEl.value = e ? (e.password||'') : ''; pasEl.type = 'password'; }
  if (noteEl) noteEl.value = e ? (e.note||'') : '';
  if (delEl)  delEl.style.display = idx >= 0 ? '' : 'none';
  _show('scr-edit');
}

const edtEye  = document.getElementById('edt-eye');
const edtBack = document.getElementById('edt-back');
const edtSave = document.getElementById('edt-save');
const edtDel  = document.getElementById('edt-del');

if (edtEye) edtEye.addEventListener('click', () => {
  const p = document.getElementById('edt-pass');
  if (p) p.type = p.type === 'password' ? 'text' : 'password';
});

if (edtBack) edtBack.addEventListener('click', () => { _show('scr-vault'); renderVault(); });

if (edtSave) edtSave.addEventListener('click', async () => {
  const dmn  = (document.getElementById('edt-dmn')||{}).value||'';
  const usr  = (document.getElementById('edt-usr')||{}).value||'';
  const pas  = (document.getElementById('edt-pass')||{}).value||'';
  const note = (document.getElementById('edt-note')||{}).value||'';
  if (!dmn.trim() || !pas.trim()) { toast('Domain and password are required'); return; }
  const entry = { id: _editIdx >= 0 ? (_vault[_editIdx].id||Date.now()) : Date.now(), domain:dmn.trim(), username:usr.trim(), password:pas, note:note.trim() };
  if (_editIdx >= 0) _vault[_editIdx] = entry;
  else _vault.push(entry);
  await _saveVault(_key, _vault);
  _show('scr-vault');
  renderVault();
  toast(_editIdx >= 0 ? 'Entry updated' : 'Password saved');
});

if (edtDel) edtDel.addEventListener('click', async () => {
  if (_editIdx < 0) return;
  _vault.splice(_editIdx, 1);
  await _saveVault(_key, _vault);
  _show('scr-vault');
  renderVault();
  toast('Entry deleted');
});
</script>
</body>
</html>
