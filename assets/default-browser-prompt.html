<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set Default Browser — Lander</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0b0d14;--bg1:#0e1118;--bg2:#131720;--bg3:#1a2030;--bg4:#222840;
  --ln:rgba(184,190,221,.07);--ln2:rgba(184,190,221,.12);
  --t0:#d4d9ef;--t1:#b8bedd;--t2:rgba(184,190,221,.55);--t3:rgba(184,190,221,.35);
  --acc:#00d4c8;--acc2:#00bdb0;--acc-raw:0,212,200;
  --f:'Geist',ui-sans-serif,system-ui,-apple-system,sans-serif;
  color-scheme:dark;
}
html,body{width:100%;height:100%;background:transparent;font-family:var(--f);overflow:hidden;-webkit-font-smoothing:antialiased;user-select:none;}
body{display:flex;align-items:center;justify-content:center;padding:12px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px) scale(.97)}to{opacity:1;transform:none}}
.card{
  background:var(--bg1);border:1px solid var(--ln2);border-radius:18px;
  width:100%;max-width:380px;overflow:hidden;
  animation:fadeIn .28s cubic-bezier(.22,1,.36,1) both;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  position:relative;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 5%,rgba(var(--acc-raw),.3) 30%,var(--acc) 50%,rgba(var(--acc-raw),.3) 70%,transparent 95%);
  pointer-events:none;}
.body{padding:28px 24px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;}
.icon{
  width:52px;height:52px;border-radius:14px;
  background:rgba(var(--acc-raw),.08);border:1.5px solid rgba(var(--acc-raw),.2);
  display:flex;align-items:center;justify-content:center;color:var(--acc);
  box-shadow:0 4px 18px rgba(var(--acc-raw),.12);
}
.title{font-size:16px;font-weight:700;color:var(--t0);letter-spacing:-.02em;line-height:1.2;}
.sub{font-size:12px;color:var(--t2);line-height:1.6;max-width:300px;}
.actions{display:flex;flex-direction:column;gap:8px;width:100%;margin-top:4px;}
.btn-primary{
  width:100%;padding:12px 20px;border:none;border-radius:12px;
  background:var(--acc);color:#000;font:600 13.5px var(--f);
  cursor:pointer;transition:filter .15s,transform .1s;
  letter-spacing:-.01em;
}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-primary:active{transform:scale(.98);}
.btn-secondary{
  width:100%;padding:10px 20px;border:1px solid var(--ln2);border-radius:12px;
  background:transparent;color:var(--t2);font:500 12.5px var(--f);
  cursor:pointer;transition:background .14s,color .14s,border-color .14s;
}
.btn-secondary:hover{background:var(--bg3);color:var(--t1);border-color:rgba(255,255,255,.14);}
</style>
</head>
<body>
<div class="card">
  <div class="body">
    <div class="icon">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="8.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M11 6v6l3.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="title">Lander is not your default browser</div>
    <div class="sub">Set Lander as your default so all links and web searches open here automatically.</div>
    <div class="actions">
      <button class="btn-primary" id="btn-set">Set it now</button>
      <button class="btn-secondary" id="btn-skip">I'm still exploring</button>
    </div>
  </div>
</div>
<script>
const { ipcRenderer } = require('electron');

// Theme sync
ipcRenderer.on('popup:theme', (_, t) => {
  if (!t) return;
  const r = document.documentElement.style;
  Object.entries(t).forEach(([k, v]) => { if (v && k !== 'f') r.setProperty('--' + k, v); });
  if (t.accRaw || t['acc-raw']) r.setProperty('--acc-raw', t.accRaw || t['acc-raw']);
});

document.getElementById('btn-set').addEventListener('click', () => {
  ipcRenderer.send('browser:set-default');
  window.close();
});

document.getElementById('btn-skip').addEventListener('click', () => {
  ipcRenderer.send('default-browser-prompt:dismiss');
  window.close();
});
</script>
</body>
</html>
