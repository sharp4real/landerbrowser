<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#080808;--bg1:#0c0c0c;--bg2:#111111;--bg3:#181818;--bg4:#202020;--bg5:#282828;
  --ln2:rgba(255,255,255,.10);--ln3:rgba(255,255,255,.16);
  --t0:rgba(255,255,255,.92);--t1:rgba(255,255,255,.65);--t2:rgba(255,255,255,.40);--t3:rgba(255,255,255,.28);
  --acc:rgba(255,255,255,.85);--acc-raw:255,255,255;
  --r-md:10px;--f:ui-sans-serif,system-ui,sans-serif;
}
html,body{
  width:100%;background:transparent;
  font-family:var(--f);font-size:13px;
  overflow:hidden;-webkit-font-smoothing:antialiased;
  user-select:none;
}
body{padding:0;}
.omni-wrap{position:relative;width:100%;}
/* ── Input row: fully transparent so it merges with the toolbar below ────── */
.omni-input-row{
  position:relative;display:flex;align-items:center;
  height:36px;
  background:transparent;
  border:1px solid transparent;
  border-radius:var(--r-md);
  box-shadow:none;
  overflow:hidden;
  transition:border-radius .1s,border-color .18s,background .18s;
}
.omni-input-row:focus-within{
  background:var(--bg3);
  border-color:rgba(var(--acc-raw),.25);
}
.omni-input-row.has-sugg{
  border-radius:var(--r-md) var(--r-md) 0 0;
  border-bottom-color:transparent;
  border-color:var(--ln2);
  background:var(--bg2);
  box-shadow:none;
}
#omni-ico{
  width:34px;height:100%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.32);
}
#omni-ico.secure{color:rgba(100,210,140,.65);}
#omni-ico.insecure{color:rgba(225,120,80,.65);}
#omni-fav{width:14px;height:14px;margin-left:8px;margin-right:6px;flex-shrink:0;border-radius:2px;display:none;}
#ob{
  flex:1;height:100%;background:transparent;border:none;outline:none;
  font-family:var(--f);font-size:12.5px;font-weight:400;
  color:var(--t0);caret-color:var(--acc);
  padding:0 8px 0 4px;letter-spacing:-.01em;
}
#ob::placeholder{color:var(--t3);}
#omni-close{
  width:28px;height:100%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.18);cursor:pointer;
  border-left:none;
  transition:color .1s,background .1s;
  opacity:0;
}
.omni-input-row:focus-within #omni-close{opacity:1;color:rgba(255,255,255,.32);}
#omni-close:hover{color:rgba(255,255,255,.75);background:rgba(255,255,255,.06);}
.sugg-list{
  display:none;
  background:var(--bg2);
  border:1px solid var(--ln2);
  border-top:none;
  border-radius:0 0 var(--r-md) var(--r-md);
  overflow:hidden;padding:2px 0 6px;
  box-shadow:0 12px 36px rgba(0,0,0,.45);
}
.sugg-list.show{display:block;}
.sugg-sep{height:1px;margin:0 8px 3px;background:rgba(var(--acc-raw),.07);}
.os-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 12px;cursor:pointer;
  font-size:12px;color:var(--t1);
  transition:background .08s;
  border-radius:8px;
  margin:0 4px;
}
.os-item:hover,.os-item.sel{background:rgba(var(--acc-raw),.08);color:var(--t0);}
.os-ico{width:14px;height:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--t3);}
.os-fav{width:14px;height:14px;flex-shrink:0;border-radius:2px;}
.os-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.os-type{font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:rgba(var(--acc-raw),.32);flex-shrink:0;}

/* Light mode overrides */
body.light{color-scheme:light;}
body.light #ob{color:rgba(0,0,0,.85);caret-color:rgba(0,0,0,.8);}
body.light .omni-input-row{background:transparent;border-color:transparent;}
body.light .omni-input-row:focus-within{background:var(--bg3);border-color:rgba(var(--acc-raw),.28);}
body.light .omni-input-row.has-sugg{background:var(--bg2);border-color:var(--ln2);}
body.light .sugg-list{background:var(--bg2);border-color:var(--ln2);border-top:none;}
body.light .os-item:hover,body.light .os-item.sel{background:rgba(0,0,0,.055);}
body.light #omni-ico{color:rgba(0,0,0,.35);}
body.light #omni-close{color:rgba(0,0,0,.3);border-left-color:rgba(0,0,0,.07);}
body.light #omni-close:hover{color:rgba(0,0,0,.7);background:rgba(0,0,0,.05);}
</style>
</head>
<body>
<div class="omni-wrap">
  <div class="omni-input-row" id="omni-input-row">
    <div id="omni-ico">
      <svg width="9" height="11" viewBox="0 0 9 11" fill="none">
        <rect x=".7" y="4.5" width="7.6" height="6" rx="1.3" stroke="currentColor" stroke-width="1.2"/>
        <path d="M2.5 4.5V3.2a2 2 0 0 1 4 0v1.3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
    <img id="omni-fav" alt="">
    <input id="ob" type="text" placeholder="Search or enter address…" autocomplete="off" spellcheck="false">
    <div id="omni-close" title="Close (Esc)">
      <svg width="9" height="9" viewBox="0 0 10 10" fill="none">
        <path d="M1.5 1.5L8.5 8.5M8.5 1.5L1.5 8.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
  <div class="sugg-list" id="sugg-list">
    <div class="sugg-sep"></div>
  </div>
</div>

<script>
'use strict';
const { ipcRenderer } = require('electron');

let _history = [];
let _items = [];
let _sel = -1;
let _lastQ = '';
let _tid = null;

const ob        = document.getElementById('ob');
const suggList  = document.getElementById('sugg-list');
const inputRow  = document.getElementById('omni-input-row');
const icoEl     = document.getElementById('omni-ico');
const favEl     = document.getElementById('omni-fav');
const closeBtn  = document.getElementById('omni-close');

closeBtn.addEventListener('mousedown', e => {
  e.preventDefault();
  ipcRenderer.send('omnibox:close');
});

// ── Init from main process ────────────────────────────────────────────────────
ipcRenderer.on('omnibox:init', (_, { url, history }) => {
  _history = history || [];
  const display = (!url || url === 'newtab') ? '' : url;
  ob.value = display;
  _lastQ   = display;
  updateIcon(url);
  setTimeout(() => { ob.focus(); ob.select(); if (display) osFetch(display); }, 30);
});

// ── Theme ─────────────────────────────────────────────────────────────────────
ipcRenderer.on('popup:theme', (_, t) => {
  if (!t) return;
  const r = document.documentElement.style;
  Object.entries(t).forEach(([k, v]) => { if (v && k !== 'f') r.setProperty('--' + k, v); });
  if (t.accRaw || t['acc-raw']) r.setProperty('--acc-raw', t.accRaw || t['acc-raw']);
  const bg = t.bg0 || '';
  document.body.classList.toggle('light', /^#[cdef]/i.test(bg.trim()));
});

// ── Icon / favicon ────────────────────────────────────────────────────────────
function updateIcon(url) {
  if (!url || url === 'newtab') {
    icoEl.style.display = 'flex'; favEl.style.display = 'none'; icoEl.className = '';
    return;
  }
  const cls = url.startsWith('https://') ? 'secure' : url.startsWith('http://') ? 'insecure' : '';
  icoEl.className = cls;
  // Try to show favicon
  try {
    const host = new URL(url).hostname;
    favEl.src = 'https://www.google.com/s2/favicons?domain=' + host + '&sz=16';
    favEl.style.display = 'block';
    icoEl.style.display = 'none';
    favEl.onerror = () => { favEl.style.display = 'none'; icoEl.style.display = 'flex'; };
  } catch { icoEl.style.display = 'flex'; favEl.style.display = 'none'; }
}

// ── Suggestions ───────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function osFav(url) {
  try { return 'https://www.google.com/s2/favicons?domain=' + new URL(url).hostname + '&sz=16'; }
  catch { return null; }
}

function renderSugg() {
  suggList.querySelectorAll('.os-item').forEach(e => e.remove());
  const has = _items.length > 0;
  suggList.classList.toggle('show', has);
  inputRow.classList.toggle('has-sugg', has);

  _items.forEach((it, i) => {
    const div = document.createElement('div');
    div.className = 'os-item' + (i === _sel ? ' sel' : '');
    div.dataset.i = i;

    let icoHtml;
    if (it.favicon) {
      icoHtml = `<img class="os-fav" src="${escHtml(it.favicon)}" onerror="this.style.display='none'">`;
    } else if (it.type === 'hist') {
      icoHtml = `<div class="os-ico"><svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M1.5 7A5.5 5.5 0 1 0 3 3.5M1.5 7V3.5M1.5 7H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 5v2.5l1.8 1.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    } else {
      icoHtml = `<div class="os-ico"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="5" cy="5" r="3.8" stroke="currentColor" stroke-width="1.2"/><path d="M8 8.5L10.5 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></div>`;
    }

    const typeLabel = it.type === 'hist' ? 'History' : it.type === 'url' ? 'Visit' : 'Search';
    div.innerHTML = icoHtml +
      `<span class="os-label">${escHtml(it.label)}</span>` +
      `<span class="os-type">${typeLabel}</span>`;

    div.addEventListener('mousedown', e => {
      e.preventDefault();
      navigate(it.nav || it.label);
    });
    suggList.appendChild(div);
  });

  // Ask main to resize window to fit content
  requestAnimationFrame(() => {
    ipcRenderer.send('omnibox:resize', document.body.scrollHeight);
  });
}

function closeSugg() {
  suggList.querySelectorAll('.os-item').forEach(e => e.remove());
  suggList.classList.remove('show');
  inputRow.classList.remove('has-sugg');
  _items = []; _sel = -1;
  ipcRenderer.send('omnibox:resize', 36);
}

function navigate(url) {
  closeSugg();
  ipcRenderer.send('nav:go', { tabUrl: url });
  ipcRenderer.send('omnibox:close');
}

function osFetch(q) {
  clearTimeout(_tid);
  if (!q) { closeSugg(); return; }
  const ql = q.toLowerCase();
  const histHits = _history
    .filter(h => h.url && (h.url.toLowerCase().includes(ql) || (h.title||'').toLowerCase().includes(ql)))
    .slice(0, 4)
    .map(h => ({ label: h.title || h.url, nav: h.url, type: 'hist', favicon: osFav(h.url) }));

  const isUrl = /^[a-zA-Z0-9]([a-zA-Z0-9-]*\.)+[a-zA-Z]{2,}/.test(q) || /^https?:\/\//.test(q);
  if (isUrl) {
    const url = /^https?:\/\//.test(q) ? q : 'https://' + q;
    _items = [{ label: url, nav: url, type: 'url' }, ...histHits].slice(0, 8);
    _sel = -1; renderSugg(); return;
  }

  _items = [...histHits, { label: q, nav: q, type: 'search' }];
  _sel = -1; renderSugg();

  _tid = setTimeout(async () => {
    try {
      const r = await fetch(
        'https://duckduckgo.com/ac/?q=' + encodeURIComponent(q) + '&type=list',
        { signal: AbortSignal.timeout(2000) }
      );
      const data = await r.json();
      const suggs = (Array.isArray(data) ? data[1] || [] : [])
        .slice(0, 5).map(s => ({ label: s, nav: s, type: 'search' }));
      if (ob.value.trim() === q) {
        _items = [...histHits, ...suggs].slice(0, 8);
        _sel = -1; ob.value = _lastQ; renderSugg();
      }
    } catch {}
  }, 180);
}

// ── Input events ──────────────────────────────────────────────────────────────
ob.addEventListener('input', function () {
  _lastQ = this.value.trim();
  updateIcon(this.value.trim());
  osFetch(_lastQ);
});

ob.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (!_items.length) return;
    _sel = e.key === 'ArrowDown'
      ? Math.min(_sel + 1, _items.length - 1)
      : Math.max(_sel - 1, -1);
    ob.value = _sel >= 0 ? (_items[_sel].nav || _items[_sel].label) : _lastQ;
    renderSugg(); return;
  }
  if (e.key === 'Enter') {
    const val = (_sel >= 0 && _items[_sel])
      ? (_items[_sel].nav || _items[_sel].label)
      : ob.value.trim();
    if (val) navigate(val);
    return;
  }
  if (e.key === 'Escape') {
    ipcRenderer.send('omnibox:close'); return;
  }
  if (e.key === 'Tab' && _items.length) {
    e.preventDefault();
    _sel = (_sel + 1) % _items.length;
    ob.value = _items[_sel].nav || _items[_sel].label;
    renderSugg();
  }
});

ob.addEventListener('blur', () => {
  // Only auto-close if focus left to outside this window entirely.
  // A brief delay lets mousedown-initiated navigations complete first.
  setTimeout(() => {
    if (!document.hasFocus()) ipcRenderer.send('omnibox:close');
  }, 150);
});

// Close immediately when the popup window itself loses OS focus
window.addEventListener('blur', () => ipcRenderer.send('omnibox:close'));
</script>
</body>
</html>
